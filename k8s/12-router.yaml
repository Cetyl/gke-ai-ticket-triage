apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: triage
  labels: { app: router, app.kubernetes.io/part-of: triage }
spec:
  replicas: 1
  selector:
    matchLabels: { app: router }
  template:
    metadata:
      labels: { app: router }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: triage-sa   # Workload Identity for Cloud Storage / Firestore
      containers:
        - name: router
          image: REGISTRY_PLACEHOLDER/router:latest
          ports:
            - { containerPort: 8000, name: http }
          envFrom:
            - configMapRef: { name: triage-config }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: triage
  labels: { app: router }
spec:
  selector: { app: router }
  ports:
    - { port: 8000, targetPort: 8000, name: http }
