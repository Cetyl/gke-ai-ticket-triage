# Copy to 01-secret.yaml and fill in your live Cloudflare Tunnel URL, then apply.
# Do NOT commit the real secret. The tunnel URL changes each time you restart cloudflared.
apiVersion: v1
kind: Secret
metadata:
  name: triage-secrets
  namespace: triage
type: Opaque
stringData:
  # Public HTTPS URL from `cloudflared tunnel --url http://localhost:11434`
  OLLAMA_BASE_URL: "https://your-tunnel-subdomain.trycloudflare.com"
