apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: triage
  labels: { app: api-gateway, app.kubernetes.io/part-of: triage }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: REGISTRY_PLACEHOLDER/api-gateway:latest
          ports:
            - { containerPort: 8000, name: http }
          envFrom:
            - configMapRef: { name: triage-config }
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: triage
  labels: { app: api-gateway }
spec:
  selector: { app: api-gateway }
  ports:
    - { port: 8000, targetPort: 8000, name: http }
