apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: triage
  labels: { app: classifier, app.kubernetes.io/part-of: triage }
spec:
  replicas: 1
  selector:
    matchLabels: { app: classifier }
  template:
    metadata:
      labels: { app: classifier }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: classifier
          image: REGISTRY_PLACEHOLDER/classifier:latest
          ports:
            - { containerPort: 8000, name: http }
          envFrom:
            - configMapRef: { name: triage-config }
            - secretRef: { name: triage-secrets, optional: true }   # OLLAMA_BASE_URL (tunnel)
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: classifier
  namespace: triage
  labels: { app: classifier }
spec:
  selector: { app: classifier }
  ports:
    - { port: 8000, targetPort: 8000, name: http }
