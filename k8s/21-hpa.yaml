# Autoscale the classifier, the service that does the most work per request.
# Requires metrics-server (enabled by default on GKE).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: classifier
  namespace: triage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: classifier
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
