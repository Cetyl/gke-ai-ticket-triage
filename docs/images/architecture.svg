<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Arial, sans-serif" role="img">
  <title>GCP architecture with the API Gateway inside the GKE cluster</title>
  <desc>The API Gateway, Classifier, Router, Notifier, Prometheus and Grafana all run inside the GKE cluster. The client reaches the in-cluster API Gateway via kubectl port-forward. The Classifier calls the local Ollama model on the user's Mac through a tunnel. The Router stores tickets in Cloud Storage, which is managed GCP outside the cluster.</desc>

  <rect x="0" y="0" width="1000" height="580" fill="#ffffff"/>
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5f6368"/></marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1a73e8"/></marker>
  </defs>
  <style>
    .ct { fill:#202124; font-size:12px; font-weight:700; }
    .t  { fill:#202124; font-size:12px; font-weight:600; text-anchor:middle; }
    .s  { fill:#5f6368; font-size:9px; text-anchor:middle; }
    .lbl{ fill:#5f6368; font-size:9.5px; text-anchor:middle; }
    .box{ fill:#ffffff; stroke:#5f6368; stroke-width:1.4; }
    .acc{ fill:#ffffff; stroke:#1a73e8; stroke-width:1.5; }
    .flow{ stroke:#5f6368; stroke-width:1.7; fill:none; marker-end:url(#g); }
    .ai { stroke:#1a73e8; stroke-width:2; fill:none; marker-end:url(#b); marker-start:url(#b); }
    .scr{ stroke:#1a73e8; stroke-width:1.2; fill:none; stroke-dasharray:3 3; marker-end:url(#b); }
    .qry{ stroke:#1a73e8; stroke-width:1.4; fill:none; marker-end:url(#b); }
    .nt { fill:#ffffff; font-size:10px; font-weight:700; text-anchor:middle; }
  </style>

  <rect x="20" y="18" width="540" height="108" rx="6" fill="#ffffff" stroke="#dadce0" stroke-width="1.4"/>
  <text x="36" y="40" class="ct">External World</text>
  <rect x="600" y="18" width="380" height="108" rx="6" fill="#ffffff" stroke="#dadce0" stroke-width="1.4"/>
  <text x="614" y="40" class="ct">On-Premises / Local Mac</text>
  <rect x="20" y="146" width="960" height="404" rx="6" fill="#f1f3f4" stroke="#dadce0" stroke-width="1.4"/>
  <text x="58" y="172" class="ct" font-size="13px">GOOGLE CLOUD PROJECT (Project ID)</text>
  <rect x="40" y="190" width="700" height="344" rx="6" fill="#e8f0fe" stroke="#aecbfa" stroke-width="1.4"/>
  <text x="70" y="214" class="ct">GKE Cluster (Region)</text>
  <rect x="58" y="392" width="372" height="124" rx="6" fill="#ffffff" stroke="#dadce0" stroke-width="1.2"/>
  <text x="72" y="412" class="ct" font-size="11px">Observability Services</text>

  <path class="flow" d="M300,108 L150,248"/>
  <path class="flow" d="M210,285 L228,285"/>
  <path class="ai"   d="M305,250 L305,165 L702,165 L702,106"/>
  <path class="flow" d="M380,285 L398,285"/>
  <path class="flow" d="M550,285 L568,285"/>
  <path class="flow" d="M475,250 L475,228 L880,228 L880,248"/>
  <path class="scr" d="M150,420 L137,322"/>
  <path class="scr" d="M172,420 L305,322"/>
  <path class="scr" d="M188,420 L475,322"/>
  <path class="scr" d="M204,420 L645,322"/>
  <path class="qry" d="M248,452 L233,452"/>

  <text x="250" y="178" class="lbl">kubectl port-forward</text>
  <text x="430" y="157" class="lbl" fill="#1a73e8">local AI call (round trip)</text>
  <text x="660" y="222" class="lbl">store</text>
  <text x="470" y="388" class="lbl">metric scrape</text>
  <text x="300" y="468" class="lbl">query</text>

  <circle cx="222" cy="182" r="10" fill="#1a73e8"/><text x="222" y="186" class="nt">1</text>
  <circle cx="219" cy="272" r="10" fill="#1a73e8"/><text x="219" y="276" class="nt">2</text>
  <circle cx="320" cy="236" r="10" fill="#1a73e8"/><text x="320" y="240" class="nt">3</text>
  <circle cx="389" cy="272" r="10" fill="#1a73e8"/><text x="389" y="276" class="nt">4</text>
  <circle cx="559" cy="272" r="10" fill="#1a73e8"/><text x="559" y="276" class="nt">5</text>

  <rect class="box" x="232" y="50" width="150" height="56" rx="8"/>
  <text x="307" y="76" class="t">Client / UI</text>
  <text x="307" y="92" class="s">Submit ticket</text>

  <rect class="acc" x="618" y="48" width="166" height="56" rx="8"/>
  <text x="701" y="72" class="t">Secure Tunnel</text>
  <text x="701" y="88" class="s">Cloudflare Tunnel</text>
  <rect class="acc" x="800" y="48" width="164" height="56" rx="8"/>
  <text x="882" y="72" class="t">Local AI</text>
  <text x="882" y="88" class="s">Ollama + Qwen2.5</text>
  <path class="ai" d="M794,76 L800,76"/>

  <rect class="box" x="60" y="248" width="150" height="74" rx="8"/>
  <text x="135" y="276" class="t">API Gateway</text>
  <text x="135" y="291" class="s">FastAPI entry</text>
  <text x="135" y="305" class="s">/metrics</text>

  <rect class="box" x="230" y="248" width="150" height="74" rx="8"/>
  <text x="305" y="276" class="t">Ticket Classifier</text>
  <text x="305" y="291" class="s">Calls local AI</text>
  <text x="305" y="305" class="s">/metrics</text>

  <rect class="box" x="400" y="248" width="150" height="74" rx="8"/>
  <text x="475" y="276" class="t">Ticket Router</text>
  <text x="475" y="291" class="s">Prioritize + store</text>
  <text x="475" y="305" class="s">/metrics</text>

  <rect class="box" x="570" y="248" width="150" height="74" rx="8"/>
  <text x="645" y="276" class="t">Notifier</text>
  <text x="645" y="291" class="s">Send alert</text>
  <text x="645" y="305" class="s">/metrics</text>

  <rect class="acc" x="76" y="424" width="158" height="64" rx="8"/>
  <text x="155" y="450" class="t">Prometheus</text>
  <text x="155" y="466" class="s">kube-prometheus-stack</text>
  <rect class="acc" x="250" y="424" width="158" height="64" rx="8"/>
  <text x="329" y="450" class="t">Grafana</text>
  <text x="329" y="466" class="s">Dashboard</text>

  <rect class="box" x="800" y="248" width="160" height="74" rx="8"/>
  <text x="880" y="276" class="t">Cloud Storage</text>
  <text x="880" y="291" class="s">Managed GCP</text>
  <text x="880" y="305" class="s">Ticket store</text>

  <rect x="690" y="392" width="282" height="124" rx="6" fill="#ffffff" stroke="#dadce0" stroke-width="1.2"/>
  <circle cx="708" cy="412" r="8" fill="#1a73e8"/><text x="708" y="415" class="nt" font-size="9px">1</text>
  <text x="724" y="415" fill="#5f6368" font-size="10px">submit ticket (client to gateway)</text>
  <circle cx="708" cy="432" r="8" fill="#1a73e8"/><text x="708" y="435" class="nt" font-size="9px">2</text>
  <text x="724" y="435" fill="#5f6368" font-size="10px">classify (gateway to classifier)</text>
  <circle cx="708" cy="452" r="8" fill="#1a73e8"/><text x="708" y="455" class="nt" font-size="9px">3</text>
  <text x="724" y="455" fill="#5f6368" font-size="10px">local AI call (round trip, leaves cloud)</text>
  <circle cx="708" cy="472" r="8" fill="#1a73e8"/><text x="708" y="475" class="nt" font-size="9px">4</text>
  <text x="724" y="475" fill="#5f6368" font-size="10px">route + store ticket</text>
  <circle cx="708" cy="492" r="8" fill="#1a73e8"/><text x="708" y="495" class="nt" font-size="9px">5</text>
  <text x="724" y="495" fill="#5f6368" font-size="10px">notify user</text>

  <text x="30" y="568" fill="#5f6368" font-size="11px" font-weight="600">Google Cloud Platform</text>
  <text x="500" y="568" fill="#202124" font-size="11px" font-weight="700" text-anchor="middle">GCP ARCHITECTURE DIAGRAM</text>
</svg>
